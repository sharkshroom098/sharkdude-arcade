<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"
		/>
		<title>Retro Hockey</title>
		<style>
			@import url('https://googleapis.com');*{box-sizing:border-box;margin:0;padding:0;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}body{background-color:#050510!important;color:#fff;font-family:'Press Start 2P',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}body::after{content:" ";display:block;position:fixed;top:0;left:0;bottom:0;right:0;background:linear-gradient(rgba(18,16,16,0) 50%,rgba(0,0,0,.25) 50%),linear-gradient(90deg,rgba(255,0,0,.06),rgba(0,255,0,.02),rgba(0,0,255,.06));z-index:10;background-size:100% 4px,6px 100%;pointer-events:none}h1{color:#ff007f;text-shadow:3px 3px 0 #00f0ff;margin-bottom:15px;font-size:18px;letter-spacing:2px}#game-container{position:relative;border:4px solid #330066;box-shadow:0 0 20px #ff007f,inset 0 0 20px #00f0ff;background-color:#0b0b1e;border-radius:10px;width:90vw;max-width:600px;aspect-ratio:600/750}canvas{display:block;width:100%;height:100%}#instructions{margin-top:10px;font-size:9px;color:#888;text-align:center;animation:b 2s infinite alternate}@keyframes b{0%,100%{opacity:1}50%{opacity:.6}}
		</style>
	</head>
	<body>
		<h1>Retro Hockey</h1>
		<div id="game-container">
			<canvas id="hockeyRink" width="600" height="750"></canvas>
		</div>
		<div id="instructions">DRAG TO CONTROL PADDLE • FIRST GOAL WINS!</div>
		<script>
			window.addEventListener('DOMContentLoaded',()=>{const canvas=document.getElementById("hockeyRink"),ctx=canvas.getContext("2d");let gameOver=false,isStartScreen=true,elapsedMiliseconds=0,startTime=0,timerInterval=null,typingMode=false,winnerName="P1",playerInitials="___",charIndex=0,particles=[];const defaultScores=[{initials:"AAA",timeStr:"00:15.50",ms:15500},{initials:"BBB",timeStr:"00:22.10",ms:22100},{initials:"CCC",timeStr:"00:35.00",ms:35000}];let highScores=JSON.parse(localStorage.getItem('rh_scores_v5'))||[...defaultScores];function createExplosion(x,y,c,count=12){for(let i=0;i<count;i++){particles.push({x:x,y:y,vx:(Math.random()-0.5)*12,vy:(Math.random()-0.5)*12,size:Math.random()*5+2,alpha:1,color:c})}}const paddleRadius=32,puckRadius=14,goalWidth=160,player1={x:300,y:650,radius:paddleRadius,color:"#00f0ff",glow:"#00aaff"},player2={x:300,y:100,radius:paddleRadius,color:"#ff007f",glow:"#aa0055"},puck={x:300,y:375,vx:8,vy:8,radius:puckRadius,speed:9,color:"#ffff00",glow:"#aaaa00",maxSpeed:24};const playBtn={x:190,y:410,w:220,h:50},resetScoresBtn={x:150,y:475,w:300,h:40},restartBtn={x:180,y:660,w:240,h:50},keys=[],letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ",keyW=45,keyH=45,skX=35,skY=460;for(let i=0;i<letters.length;i++){let r=Math.floor(i/7),c=i%7;keys.push({char:letters[i],x:skX+c*57,y:skY+r*57,w:keyW,h:keyH})}keys.push({char:"CLR",x:skX+285,y:skY+171,w:102,h:keyH});let targetX=300,targetY=650;function updateInputCoords(clientX,clientY){const r=canvas.getBoundingClientRect();targetX=(clientX-r.left)*(600/r.width);targetY=(clientY-r.top)*(750/r.height)}function formatTime(ms){let ts=Math.floor(ms/1000),m=Math.floor(ts/60),s=ts%60,h=Math.floor((ms%1000)/10);return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}.${h.toString().padStart(2,'0')}`}function startTimer(){startTime=Date.now();timerInterval=setInterval(()=>{elapsedMiliseconds=Date.now()-startTime},30)}function handleInput(e){let t=e.touches?e.touches[0]:e;if(!t)return;updateInputCoords(t.clientX,t.clientY);if(!isStartScreen&&!typingMode&&!gameOver){player1.x=Math.max(player1.radius,Math.min(600-player1.radius,targetX));player1.y=Math.max(375+player1.radius,Math.min(750-player1.radius,targetY))}}window.addEventListener('mousemove',handleInput);window.addEventListener('touchmove',handleInput,{passive:false});window.addEventListener('touchstart',(e)=>{handleInput(e);handleInteractions(e)},{passive:false});canvas.addEventListener('click',handleInteractions);
			function handleInteractions(e){if(e&&e.type==='touchstart'&&e.touches.length>1)return;if(isStartScreen){if(targetX>=playBtn.x&&targetX<=playBtn.x+playBtn.w&&targetY>=playBtn.y&&targetY<=playBtn.y+playBtn.h){isStartScreen=false;resetGame()}if(targetX>=resetScoresBtn.x&&targetX<=resetScoresBtn.x+resetScoresBtn.w&&targetY>=resetScoresBtn.y&&targetY<=resetScoresBtn.y+resetScoresBtn.h){highScores=[...defaultScores];localStorage.setItem('rh_scores_v5',JSON.stringify(highScores))}}else if(typingMode){for(let k of keys){if(targetX>=k.x&&targetX<=k.x+k.w&&targetY>=k.y&&targetY<=k.y+k.h){if(k.char==="CLR"){playerInitials="___";charIndex=0}else if(charIndex<3){let a=playerInitials.split("");a[charIndex]=k.char;playerInitials=a.join("");charIndex++;if(charIndex===3){highScores.push({initials:playerInitials,timeStr:formatTime(elapsedMiliseconds),ms:elapsedMiliseconds});highScores.sort((a,b)=>a.ms-b.ms);highScores=highScores.slice(0,3);localStorage.setItem('rh_scores_v5',JSON.stringify(highScores));typingMode=false}}break}}}else if(gameOver){if(targetX>=restartBtn.x&&targetX<=restartBtn.x+restartBtn.w&&targetY>=restartBtn.y&&targetY<=restartBtn.y+restartBtn.h){resetGame()}}}function resetGame(){elapsedMiliseconds=0;gameOver=false;typingMode=false;playerInitials="___";charIndex=0;particles=[];player1.x=300;player1.y=650;player2.x=300;player2.y=100;puck.x=300;puck.y=375;let angle=(Math.random()-0.5)*2;puck.vx=Math.sin(angle)*puck.speed;puck.vy=Math.cos(angle)*puck.speed;clearInterval(timerInterval);startTimer()}function drawCircle(x,y,r,c,g){ctx.shadowBlur=15;ctx.shadowColor=g;ctx.fillStyle=c;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0}function drawRink(){ctx.strokeStyle="rgba(255,0,127,0.4)";ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(0,375);ctx.lineTo(600,375);ctx.stroke();ctx.beginPath();ctx.arc(300,375,70,0,Math.PI*2);ctx.stroke();ctx.strokeStyle="rgba(0,240,255,0.3)";ctx.beginPath();ctx.arc(300,0,80,0,Math.PI);ctx.stroke();ctx.beginPath();ctx.arc(300,750,80,Math.PI,0);ctx.stroke();ctx.fillStyle="#050510";ctx.fillRect(220,-5,160,10);ctx.fillRect(220,745,160,10);ctx.strokeStyle="#fff";ctx.lineWidth=3;ctx.strokeRect(220,0,160,2);ctx.strokeRect(220,745,160,2);ctx.strokeStyle="rgba(0,240,255,0.4)";ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,45,0,Math.PI*0.5);ctx.stroke();ctx.beginPath();ctx.arc(600,0,45,Math.PI*0.5,Math.PI);ctx.stroke();ctx.beginPath();ctx.arc(0,750,45,Math.PI*1.5,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(600,750,45,Math.PI,Math.PI*1.5);ctx.stroke()}function update(){if(isStartScreen){puck.x+=puck.vx;puck.y+=puck.vy;if(puck.x-puck.radius<=0||puck.x+puck.radius>=600)puck.vx=-puck.vx;if(puck.y-puck.radius<=0||puck.y+puck.radius>=750)puck.vy=-puck.vy;return}if(gameOver)return;if(puck.y<475){player2.x+=(puck.x-player2.x)*.06;player2.y+=((puck.y<375?puck.y-40:100)-player2.y)*.05}else{player2.x+=(300-player2.x)*.03;player2.y+=(100-player2.y)*.03}player2.x=Math.max(player2.radius,Math.min(600-player2.radius,player2.x));player2.y=Math.max(player2.radius,Math.min(375-player2.radius,player2.y));puck.x+=puck.vx;puck.y+=puck.vy;puck.vx*=.997;puck.vy*=.997;if(Math.abs(puck.vx)+Math.abs(puck.vy)>2){particles.push({x:puck.x,y:puck.y,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,size:Math.random()*3+1,alpha:0.8,color:"#ffff00"})}for(let i=particles.length-1;i>=0;i--){let p=particles[i];p.x+=p.vx;p.y+=p.vy;p.alpha-=0.02;if(p.alpha<=0)particles.splice(i,1)}if((puck.x<=45&&puck.y<=45)||(puck.x>=555&&puck.y<=45)||(puck.x<=45&&puck.y>=705)||(puck.x>=555&&puck.y>=705)){puck.vx*=1.6;puck.vy*=1.6;createExplosion(puck.x,puck.y,"#ffff00",25)}if(puck.x-puck.radius<=0){puck.x=puck.radius;puck.vx=-puck.vx;createExplosion(puck.x,puck.y,"#ffff00")}else if(puck.x+puck.radius>=600){puck.x=586;puck.vx=-puck.vx;createExplosion(puck.x,puck.y,"#ffff00")}if(puck.y-puck.radius<=0){if(puck.x>220&&puck.x<380){createExplosion(puck.x,puck.y,"#00f0ff",30);clearInterval(timerInterval);gameOver=true;winnerName="PLAYER";if(elapsedMiliseconds<highScores[highScores.length-1].ms||highScores.length<3)typingMode=true}else{puck.y=puck.radius;puck.vy=-puck.vy;createExplosion(puck.x,puck.y,"#ffff00")}}else if(puck.y+puck.radius>=750){if(puck.x>220&&puck.x<380){createExplosion(puck.x,puck.y,"#ff007f",30);clearInterval(timerInterval);gameOver=true;winnerName="CPU"}else{puck.y=736;puck.vy=-puck.vy;createExplosion(puck.x,puck.y,"#ffff00")}}let d1x=puck.x-player1.x,d1y=puck.y-player1.y,dist1=Math.sqrt(d1x*d1x+d1y*d1y);if(dist1<player1.radius+puck.radius){createExplosion(puck.x,puck.y,"#00f0ff");puck.x+=((player1.radius+puck.radius)-dist1)*(d1x/dist1);puck.y+=((player1.radius+puck.radius)-dist1)*(d1y/dist1);let speedLimit=Math.sqrt(puck.vx*puck.vx+puck.vy*puck.vy);let currentSpeed=Math.max(speedLimit,puck.speed)*1.1;if(currentSpeed>puck.maxSpeed)currentSpeed=puck.maxSpeed;puck.vx=(d1x/dist1)*currentSpeed;puck.vy=(d1y/dist1)*currentSpeed}let d2x=puck.x-player2.x,d2y=puck.y-player2.y,dist2=Math.sqrt(d2x*d2x+d2y*d2y);if(dist2<player2.radius+puck.radius){createExplosion(puck.x,puck.y,"#ff007f");puck.x+=((player2.radius+puck.radius)-dist2)*(d2x/dist2);puck.y+=((player2.radius+puck.radius)-dist2)*(d2y/dist2);let currentSpeed=puck.speed;puck.vx=(d2x/dist2)*currentSpeed;puck.vy=(d2y/dist2)*currentSpeed}}function drawS(by){ctx.font="14px 'Press Start 2P'";ctx.fillStyle="#00f0ff";ctx.fillText("TOP FAST TIMES",300,by);ctx.font="11px 'Press Start 2P'";ctx.fillStyle="#fff";for(let i=0;i<highScores.length;i++)ctx.fillText(`${i+1}. ${highScores[i].initials} - ${highScores[i].timeStr}`,300,by+25+(i*22))}function draw(){ctx.fillStyle="#0b0b1e";ctx.fillRect(0,0,600,750);if(isStartScreen){drawCircle(puck.x,puck.y,puck.radius,puck.color,puck.glow);ctx.fillStyle="rgba(5,5,16,0.4)";ctx.fillRect(0,0,600,750);ctx.font="24px 'Press Start 2P'";ctx.fillStyle="#ff007f";ctx.textAlign="center";ctx.shadowBlur=15;ctx.shadowColor="#00f0ff";ctx.fillText("RETRO HOCKEY",300,140);drawS(200);ctx.fillStyle="#0a0a28";ctx.strokeStyle="#00f0ff";ctx.lineWidth=3;ctx.fillRect(playBtn.x,playBtn.y,playBtn.w,playBtn.h);ctx.strokeRect(playBtn.x,playBtn.y,playBtn.w,playBtn.h);ctx.fillStyle="#ff007f";ctx.fillRect(resetScoresBtn.x,resetScoresBtn.y,resetScoresBtn.w,resetScoresBtn.h);ctx.font="11px 'Press Start 2P'";ctx.fillStyle="#ffff00";ctx.fillText("PLAY GAME",playBtn.x+playBtn.w/2,playBtn.y+30);ctx.fillStyle="#fff";ctx.fillText("RESET LEADERBOARD",resetScoresBtn.x+resetScoresBtn.w/2,resetScoresBtn.y+25);ctx.shadowBlur=0;return}drawRink();for(let p of particles){ctx.fillStyle=p.color;ctx.globalAlpha=p.alpha;ctx.fillRect(p.x,p.y,p.size,p.size)}ctx.globalAlpha=1;ctx.font="12px 'Press Start 2P'";ctx.fillStyle="rgba(255,255,255,0.4)";ctx.textAlign="center";ctx.fillText("TIME: "+formatTime(elapsedMiliseconds),300,395);drawCircle(puck.x,puck.y,puck.radius,puck.color,puck.glow);drawCircle(player1.x,player1.y,player1.radius,player1.color,player1.glow);drawCircle(player2.x,player2.y,player2.radius,player2.color,player2.glow);if(gameOver){ctx.fillStyle="rgba(5,5,16,0.9)";ctx.fillRect(0,0,600,750);ctx.textAlign="center";if(typingMode){ctx.font="16px 'Press Start 2P'";ctx.fillStyle="#ffff00";ctx.fillText(`NEW HIGH SCORE!`,300,70);ctx.font="12px 'Press Start 2P'";ctx.fillStyle="#fff";ctx.fillText("ENTER INITIALS:",300,115);ctx.font="28px 'Press Start 2P'";ctx.fillStyle="#00f0ff";ctx.fillText(playerInitials,300,175);for(let k of keys){ctx.fillStyle="#220044";ctx.strokeStyle="#ff007f";ctx.lineWidth=2;ctx.fillRect(k.x,k.y,k.w,k.h);ctx.strokeRect(k.x,k.y,k.w,k.h);ctx.font=k.char==="CLR"?"10px 'Press Start 2P'":"14px 'Press Start 2P'";ctx.fillStyle="#fff";ctx.fillText(k.char,k.x+k.w/2,k.y+k.h/2+5)}}else{ctx.font="24px 'Press Start 2P'";ctx.fillStyle="#00f0ff";ctx.shadowBlur=10;ctx.shadowColor="#00f0ff";ctx.fillText(`${winnerName} WINS!`,300,195);ctx.font="14px 'Press Start 2P'";ctx.fillStyle="#ffff00";ctx.fillText(`TIME: ${formatTime(elapsedMiliseconds)}`,300,245);ctx.shadowBlur=0;drawS(325);ctx.fillStyle="#050510";ctx.strokeStyle="#00f0ff";ctx.lineWidth=3;ctx.fillRect(restartBtn.x,restartBtn.y,restartBtn.w,restartBtn.h);ctx.strokeRect(restartBtn.x,restartBtn.y,restartBtn.w,restartBtn.h);ctx.font="12px 'Press Start 2P'";ctx.fillStyle="#ffff00";ctx.fillText("PLAY AGAIN",300,692)}}}function gameLoop(){update();draw();requestAnimationFrame(gameLoop)}gameLoop()});
		</script>
	</body>
</html>
