<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"
		/>
		<title>2D Parkour</title>
	</head>
	<body>
		<div id="app-wrapper">
			<div id="ui-container">
				<div id="level-display">LEVEL: 1/5</div>
				<div id="status-display">2D PARKOUR</div>
				<div id="diamonds-display">DIAMONDS: 0</div>
				<div id="deaths-display">DEATHS: 0</div>
			</div>
			<div id="game-container">
				<canvas id="gameCanvas" width="800" height="400"></canvas>
				<div
					id="bonus-code-box"
					class="hidden"
					style="position:absolute;top:20px;left:50%;transform:translateX(-50%);z-index:8;display:flex;gap:10px;background:rgba(0,0,0,0.8);padding:8px;border:2px solid #ff00ff;box-shadow:0 0 10px #ff00ff;"
				>
					<input
						type="text"
						id="cheat-input"
						placeholder="ENTER CODE"
						style="background:#050515;border:1px solid #00ffff;color:#05ff00;font-family:inherit;padding:5px 10px;font-size:12px;outline:none;width:130px;"
					/>
					<button
						id="cheat-submit-btn"
						style="padding:4px 12px;font-size:12px;box-shadow:2px 2px #ff00ff;"
					>
						ENTER
					</button>
				</div>
				<div id="touch-controls">
					<div id="joystick-zone" class="touch-zone">
						<div id="joystick-knob"></div>
					</div>
					<div id="jump-btn" class="touch-zone">JUMP</div>
				</div>
				<div id="start-screen" class="screen">
					<h1>2D Parkour</h1>
					<p>
						Drag Left Joystick to MOVE.<br />Tap Right Button to
						JUMP.<br />Find the invisible key at the bottom of level
						2 to unlock the bonus dimension!
					</p>
					<button id="start-btn">INSERT COIN</button>
				</div>
				<div id="win-screen" class="screen hidden">
					<h1>VICTORY!</h1>
					<p>You mastered all stages and collected the gems.</p>
					<button id="restart-btn">PLAY AGAIN</button>
				</div>
			</div>
		</div>
	</body>
</html>
<style>
	* { box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
	body { margin: 0; padding: 0; background-color: #000; color: #05ff00; font-family: 'Courier New', Courier, monospace; width: 100vw; height: 100vh; overflow: hidden; position: fixed; }
	#app-wrapper { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
	#ui-container { width: 100%; height: 30px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: bold; text-shadow: 2px 2px #ff00ff; padding: 0 15px; }
	#game-container { position: relative; flex: 1; width: 100%; border: 4px solid #00ffff; box-shadow: 0 0 20px #00ffff; background-color: #050515; overflow: hidden; }
	canvas { width: 100%; height: 100%; display: block; object-fit: contain; }
	#bonus-code-box input::placeholder { color: rgba(5, 255, 0, 0.4); }
	#bonus-code-box.hidden, .hidden { display: none !important; }
	.screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; text-align: center; padding: 20px; }
	h1 { color: #ff00ff; font-size: 28px; margin: 0 0 8px 0; text-shadow: 3px 3px #00ffff; text-transform: uppercase; }
	p { color: #fff; font-size: 13px; margin: 0 0 15px 0; line-height: 1.4; }
	button { background-color: #05ff00; color: #000; border: none; padding: 8px 20px; font-size: 16px; font-family: inherit; font-weight: bold; cursor: pointer; box-shadow: 4px 4px #ff00ff; }
	#touch-controls { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
	.touch-zone { position: absolute; pointer-events: auto; }
	#joystick-zone { left: 25px; bottom: 20px; width: 110px; height: 110px; background: rgba(255, 255, 255, 0.08); border: 3px dashed #00ffff; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
	#joystick-knob { width: 45px; height: 45px; background: #ff00ff; border: 2px solid #fff; border-radius: 50%; box-shadow: 0 0 10px #ff00ff; transform: translate3d(0, 0, 0); }
	#jump-btn { right: 35px; bottom: 25px; width: 75px; height: 75px; background: rgba(5, 255, 0, 0.2); border: 4px solid #05ff00; border-radius: 50%; color: #05ff00; font-size: 16px; font-weight: bold; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px #05ff00; }
	#jump-btn:active { background: #05ff00; color: #000; }
</style>
<script>
	const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d'), GRAVITY = 0.5, FRICTION = 0.85;
	let currentLevel = 0, deathCount = 0, diamondCount = 0, gameActive = false, hasSecretKey = false, isBonusActive = false, codeClaimed = false;
	const inputs = { left: false, right: false, up: false }, player = { x: 50, y: 300, width: 20, height: 32, vx: 0, vy: 0, grounded: false, jumpForce: 10.5, speed: 4, color: '#ff00ff' };
	const levels = [
	    { start: { x: 50, y: 300 }, exit: { x: 730, y: 290, width: 30, height: 60 }, platforms: [{ x: 0, y: 350, w: 200, h: 50, type: 'normal' }, { x: 280, y: 300, w: 120, h: 20, type: 'normal' }, { x: 480, y: 250, w: 120, h: 20, type: 'normal' }, { x: 680, y: 350, w: 120, h: 50, type: 'normal' }], hazards: [{ x: 200, y: 380, w: 480, h: 20 }], diamonds: [{ x: 340, y: 260, collected: false }, { x: 540, y: 210, collected: false }] },
	    { start: { x: 40, y: 300 }, exit: { x: 740, y: 90, width: 30, height: 60 }, platforms: [{ x: 0, y: 350, w: 100, h: 50, type: 'normal' }, { x: 160, y: 300, w: 50, h: 20, type: 'normal' }, { x: 280, y: 250, w: 50, h: 20, type: 'normal' }, { x: 400, y: 200, w: 50, h: 20, type: 'normal' }, { x: 520, y: 150, w: 50, h: 20, type: 'normal' }, { x: 640, y: 150, w: 160, h: 250, type: 'normal' }, { x: 480, y: 380, w: 100, h: 20, type: 'normal' }], hazards: [{ x: 100, y: 390, w: 380, h: 10 }], diamonds: [{ x: 185, y: 260, collected: false }, { x: 305, y: 210, collected: false }, { x: 425, y: 160, collected: false }], secretKeyItem: { x: 520, y: 360, w: 20, h: 12, collected: false } },
	    { start: { x: 50, y: 100 }, exit: { x: 730, y: 320, width: 30, height: 60 }, platforms: [{ x: 20, y: 150, w: 100, h: 20, type: 'normal' }, { x: 180, y: 150, w: 150, h: 20, type: 'ice' }, { x: 400, y: 180, w: 150, h: 20, type: 'ice' }, { x: 600, y: 230, w: 150, h: 20, type: 'ice' }, { x: 550, y: 380, w: 250, h: 20, type: 'normal' }, { x: 450, y: 300, w: 100, h: 20, type: 'bonusTrigger' }, { x: 250, y: 350, w: 120, h: 20, type: 'bonusTrigger' }], hazards: [{ x: 0, y: 395, w: 800, h: 5 }, { x: 400, y: 200, w: 30, h: 100 }], diamonds: [{ x: 250, y: 110, collected: false }, { x: 475, y: 140, collected: false }, { x: 310, y: 310, collected: false }] },
	    { start: { x: 50, y: 330 }, exit: { x: 50, y: 70, width: 30, height: 60 }, platforms: [{ x: 0, y: 380, w: 150, h: 20, type: 'normal' }, { x: 220, y: 320, w: 100, h: 20, type: 'normal' }, { x: 380, y: 270, w: 100, h: 20, type: 'normal' }, { x: 540, y: 220, w: 100, h: 20, type: 'normal' }, { x: 680, y: 160, w: 120, h: 240, type: 'normal' }, { x: 500, y: 130, w: 100, h: 20, type: 'normal' }, { x: 320, y: 130, w: 100, h: 20, type: 'normal' }, { x: 20, y: 130, w: 220, h: 20, type: 'normal' }], hazards: [{ x: 150, y: 350, w: 70, h: 50 }, { x: 320, y: 300, w: 60, h: 100 }, { x: 480, y: 250, w: 60, h: 150 }], diamonds: [{ x: 270, y: 280, collected: false }, { x: 430, y: 230, collected: false }, { x: 590, y: 180, collected: false }, { x: 120, y: 90, collected: false }] },
	    { start: { x: 30, y: 300 }, exit: { x: 740, y: 320, width: 30, height: 60 }, platforms: [{ x: 0, y: 350, w: 80, h: 50, type: 'normal' }, { x: 130, y: 290, w: 40, h: 20, type: 'normal' }, { x: 220, y: 230, w: 40, h: 20, type: 'normal' }, { x: 310, y: 170, w: 40, h: 20, type: 'normal' }, { x: 420, y: 170, w: 80, h: 20, type: 'ice' }, { x: 560, y: 230, w: 40, h: 20, type: 'normal' }, { x: 650, y: 290, w: 40, h: 20, type: 'normal' }, { x: 720, y: 380, w: 80, h: 20, type: 'normal' }], hazards: [{ x: 80, y: 370, w: 640, h: 30 }, { x: 200, y: 0, w: 20, h: 120 }, { x: 520, y: 0, w: 20, h: 85 }], diamonds: [{ x: 150, y: 250, collected: false }, { x: 240, y: 190, collected: false }, { x: 330, y: 130, collected: false }, { x: 670, y: 250, collected: false }] }
	];
	const bonusLevelData = {
	    start: { x: 50, y: 300 }, exit: { x: 730, y: 320, width: 30, height: 60 },
	    platforms: [{ x: 0, y: 350, w: 150, h: 50, type: 'normal' }, { x: 200, y: 280, w: 100, h: 20, type: 'normal' }, { x: 350, y: 220, w: 100, h: 20, type: 'normal' }, { x: 500, y: 280, w: 100, h: 20, type: 'normal' }, { x: 680, y: 380, w: 120, h: 20, type: 'normal' }], hazards: [],
	    diamonds: [{ x: 100, y: 280, collected: false }, { x: 220, y: 220, collected: false }, { x: 250, y: 220, collected: false }, { x: 370, y: 160, collected: false }, { x: 400, y: 160, collected: false }, { x: 520, y: 220, collected: false }, { x: 550, y: 220, collected: false }, { x: 700, y: 300, collected: false }, { x: 730, y: 240, collected: false }, { x: 300, y: 100, collected: false }, { x: 450, y: 100, collected: false }, { x: 600, y: 120, collected: false }]
	};
	const joystickZone = document.getElementById('joystick-zone'), joystickKnob = document.getElementById('joystick-knob'), jumpBtn = document.getElementById('jump-btn');
	let joystickActive = false, joystickTouchId = null, joystickCenter = { x: 0, y: 0 };
	function updateJoystickCenter() { const rect = joystickZone.getBoundingClientRect(); joystickCenter = rect.width === 0 ? { x: 80, y: window.innerHeight - 75 } : { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 }; }
	window.addEventListener('touchstart', (e) => {
	    if(e.target.id === 'cheat-input' || e.target.id === 'cheat-submit-btn') return;
	    for (let i = 0; i < e.changedTouches.length; i++) {
	        let touch = e.changedTouches[i]; updateJoystickCenter();
	        let dx = touch.clientX - joystickCenter.x, dy = touch.clientY - joystickCenter.y, dist = Math.sqrt(dx * dx + dy * dy);
	        if (dist < 75 && !joystickActive) { e.preventDefault(); joystickTouchId = touch.identifier; joystickActive = true; handleJoystickMove(touch.clientX, touch.clientY); }
	    }
	}, { passive: false });
	window.addEventListener('touchmove', (e) => {
	    if (!joystickActive) return;
	    for (let i = 0; i < e.touches.length; i++) { if (e.touches[i].identifier === joystickTouchId) { if(e.cancelable) e.preventDefault(); handleJoystickMove(e.touches[i].clientX, e.touches[i].clientY); } }
	}, { passive: false });
	const resetJoystick = () => { joystickActive = false; joystickTouchId = null; inputs.left = false; inputs.right = false; joystickKnob.style.transform = `translate(0, 0)`; };
	window.addEventListener('touchend', (e) => { for (let i = 0; i < e.changedTouches.length; i++) if (e.changedTouches[i].identifier === joystickTouchId) resetJoystick(); });
	window.addEventListener('touchcancel', (e) => { for (let i = 0; i < e.changedTouches.length; i++) if (e.changedTouches[i].identifier === joystickTouchId) resetJoystick(); });
	function handleJoystickMove(clientX, clientY) {
	    let dx = clientX - joystickCenter.x, dy = clientY - joystickCenter.y, dist = Math.sqrt(dx * dx + dy * dy);
	    if (dist > 35) { dx = (dx / dist) * 35; dy = (dy / dist) * 35; }
	    joystickKnob.style.transform = `translate3d(${dx}px, ${dy}px, 0)`; inputs.left = dx < -8; inputs.right = dx > 8;
	}
	jumpBtn.addEventListener('touchstart', (e) => { e.preventDefault(); inputs.up = true; }, { passive: false });
	jumpBtn.addEventListener('touchend', (e) => { e.preventDefault(); inputs.up = false; }, { passive: false });
	jumpBtn.addEventListener('touchcancel', (e) => { e.preventDefault(); inputs.up = false; }, { passive: false });
	window.addEventListener('keydown', (e) => {
	    if(document.activeElement.id === 'cheat-input') return;
	    if (e.code === 'KeyD' || e.code === 'ArrowRight') inputs.right = true;
	    if (e.code === 'KeyA' || e.code === 'ArrowLeft') inputs.left = true;
	    if (e.code === 'Space' || e.code === 'KeyW' || e.code === 'ArrowUp') inputs.up = true;
	});
	window.addEventListener('keyup', (e) => {
	    if (e.code === 'KeyD' || e.code === 'ArrowRight') inputs.right = false;
	    if (e.code === 'KeyA' || e.code === 'ArrowLeft') inputs.left = false;
	    if (e.code === 'Space' || e.code === 'KeyW' || e.code === 'ArrowUp') inputs.up = false;
	});
</script>
<script>
	document.getElementById('cheat-submit-btn').addEventListener('click', evalCheat);
	document.getElementById('cheat-input').addEventListener('keydown', (e) => { if(e.key === 'Enter') evalCheat(); });
	function evalCheat() {
	    const val = document.getElementById('cheat-input').value.trim();
	    if(val === "People So Stupid" && !codeClaimed) {
	        codeClaimed = true; diamondCount += 100;
	        document.getElementById('diamonds-display').innerText = `DIAMONDS: ${diamondCount}`;
	        document.getElementById('status-display').innerText = "+100 DIAMONDS!";
	        document.getElementById('cheat-input').value = ""; document.getElementById('cheat-input').blur();
	        setTimeout(() => { document.getElementById('status-display').innerText = "GOLDEN DIMENSION"; }, 3000);
	    }
	}
	document.getElementById('start-btn').addEventListener('click', () => { document.getElementById('start-screen').classList.add('hidden'); diamondCount = 0; hasSecretKey = false; isBonusActive = false; codeClaimed = false; document.getElementById('diamonds-display').innerText = `DIAMONDS: ${diamondCount}`; document.getElementById('status-display').innerText = "2D PARKOUR"; initLevel(0); gameActive = true; });
	document.getElementById('restart-btn').addEventListener('click', () => { document.getElementById('win-screen').classList.add('hidden'); deathCount = 0; diamondCount = 0; hasSecretKey = false; isBonusActive = false; codeClaimed = false; document.getElementById('deaths-display').innerText = `DEATHS: ${deathCount}`; document.getElementById('diamonds-display').innerText = `DIAMONDS: ${diamondCount}`; document.getElementById('status-display').innerText = "2D PARKOUR"; levels.forEach(lvl => lvl.diamonds.forEach(d => d.collected = false)); bonusLevelData.diamonds.forEach(d => d.collected = false); if(levels.secretKeyItem) levels.secretKeyItem.collected = false; initLevel(0); gameActive = true; });
	function initLevel(lvlIdx) { isBonusActive = false; currentLevel = lvlIdx; document.getElementById('bonus-code-box').classList.add('hidden'); document.getElementById('level-display').innerText = `LEVEL: ${currentLevel + 1}/5`; document.getElementById('status-display').innerText = "2D PARKOUR"; const lvl = levels[currentLevel]; player.x = lvl.start.x; player.y = lvl.start.y; player.vx = 0; player.vy = 0; player.grounded = false; resetJoystick(); }
	function launchBonusStage() { isBonusActive = true; document.getElementById('bonus-code-box').classList.remove('hidden'); document.getElementById('level-display').innerText = `BONUS ROOM`; document.getElementById('status-display').innerText = "GOLDEN DIMENSION"; player.x = bonusLevelData.start.x; player.y = bonusLevelData.start.y; player.vx = 0; player.vy = 0; player.grounded = false; resetJoystick(); }
	function checkCollision(obj1, obj2) { return obj1.x < obj2.x + obj2.w && obj1.x + obj1.width > obj2.x && obj1.y < obj2.y + obj2.h && obj1.y + obj1.height > obj2.y; }
	function update() {
	    if (!gameActive) return;
	    const lvl = isBonusActive ? bonusLevelData : levels[currentLevel];
	    let currentFriction = FRICTION, currentSpeed = player.speed, accelRate = 0.5, standingOnIce = false;
	    lvl.platforms.forEach(plat => { if (player.x + player.width > plat.x && player.x < plat.x + plat.w && Math.abs((player.y + player.height) - plat.y) < 2) { if (plat.type === 'ice') standingOnIce = true; } });
	    if (standingOnIce) { currentFriction = 0.995; currentSpeed = 4.5; accelRate = 0.08; }
	    if (inputs.right) { if (player.vx < currentSpeed) player.vx += accelRate; } else if (inputs.left) { if (player.vx > -currentSpeed) player.vx -= accelRate; } else { player.vx *= currentFriction; if (Math.abs(player.vx) < 0.1) player.vx = 0; }
	    if (inputs.up && player.grounded) { player.vy = -player.jumpForce; player.grounded = false; }
	    player.vy += GRAVITY; player.x += player.vx; player.y += player.vy;
	    if (player.x < 0) player.x = 0; if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
	    player.grounded = false;
	    lvl.platforms.forEach(plat => {
	        if (checkCollision(player, plat)) {
	            if (!isBonusActive && currentLevel === 2 && plat.type === 'bonusTrigger' && hasSecretKey) { launchBonusStage(); return; }
	            let overlapX = Math.min(player.x + player.width, plat.x + plat.w) - Math.max(player.x, plat.x), overlapY = Math.min(player.y + player.height, plat.y + plat.h) - Math.max(player.y, plat.y);
	            if (overlapX > overlapY) { if (player.vy > 0 && player.y + player.height - player.vy <= plat.y + 2) { player.y -= overlapY; player.vy = 0; player.grounded = true; } else if (player.vy < 0) { player.y += overlapY; player.vy = 0; } }
	            else { if (player.vx > 0) { player.x -= overlapX; player.vx = 0; } else if (player.vx < 0) { player.x += overlapX; player.vx = 0; } }
	        }
	    });
	    if (!isBonusActive && currentLevel === 1 && lvl.secretKeyItem && !lvl.secretKeyItem.collected) { if (checkCollision(player, { x: lvl.secretKeyItem.x, y: lvl.secretKeyItem.y, w: lvl.secretKeyItem.w, h: lvl.secretKeyItem.h })) { lvl.secretKeyItem.collected = true; hasSecretKey = true; document.getElementById('status-display').innerText = "BONUS UNLOCKED!"; setTimeout(() => { if(!isBonusActive) document.getElementById('status-display').innerText = "2D PARKOUR"; }, 2500); } }
	    lvl.diamonds.forEach(diamond => { if (!diamond.collected) { if (checkCollision(player, { x: diamond.x, y: diamond.y, w: 12, h: 12 })) { diamond.collected = true; diamondCount++; document.getElementById('diamonds-display').innerText = `DIAMONDS: ${diamondCount}`; } } });
	    lvl.hazards.forEach(haz => { if (checkCollision(player, haz)) { deathCount++; document.getElementById('deaths-display').innerText = `DEATHS: ${deathCount}`; if (isBonusActive) launchBonusStage(); else initLevel(currentLevel); } });
	    if (player.y > canvas.height) { deathCount++; document.getElementById('deaths-display').innerText = `DEATHS: ${deathCount}`; if (isBonusActive) launchBonusStage(); else initLevel(currentLevel); }
	    if (checkCollision(player, { x: lvl.exit.x, y: lvl.exit.y, w: lvl.exit.width, h: lvl.exit.height })) { if (isBonusActive) { initLevel(3); } else if (currentLevel < levels.length - 1) { initLevel(currentLevel + 1); } else { gameActive = false; document.getElementById('win-screen').classList.remove('hidden'); } }
	}
	function draw() {
	    ctx.fillStyle = '#050515'; ctx.fillRect(0, 0, canvas.width, canvas.height); if (!gameActive) return;
	    const lvl = isBonusActive ? bonusLevelData : levels[currentLevel]; ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)'; ctx.lineWidth = 1;
	    for (let i = 0; i < canvas.width; i += 40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }
	    lvl.hazards.forEach(haz => { ctx.fillStyle = '#ff3300'; ctx.fillRect(haz.x, haz.y, haz.w, haz.h); ctx.strokeStyle = '#ff9900'; ctx.lineWidth = 2; ctx.strokeRect(haz.x, haz.y, haz.w, haz.h); });
	    lvl.platforms.forEach(plat => { ctx.fillStyle = plat.type === 'ice' ? '#00ffff' : plat.type === 'bonusTrigger' ? '#ff00ff' : '#0055ff'; ctx.fillRect(plat.x, plat.y, plat.w, plat.h); ctx.strokeStyle = plat.type === 'ice' ? '#ffffff' : '#00ffff'; ctx.lineWidth = 3; ctx.strokeRect(plat.x, plat.y, plat.w, plat.h); });
	    if (!isBonusActive && currentLevel === 1 && lvl.secretKeyItem && !lvl.secretKeyItem.collected) { ctx.fillStyle = '#050515'; ctx.fillRect(lvl.secretKeyItem.x, lvl.secretKeyItem.y, lvl.secretKeyItem.w, lvl.secretKeyItem.h); }
	    lvl.diamonds.forEach(diamond => { if (!diamond.collected) { ctx.save(); ctx.translate(diamond.x + 6, diamond.y + 6); ctx.rotate((Date.now() / 400) % (Math.PI * 2)); ctx.fillStyle = '#ffff00'; ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 8; ctx.beginPath(); ctx.moveTo(0, -7); ctx.lineTo(5, 0); ctx.lineTo(0, 7); ctx.lineTo(-5, 0); ctx.closePath(); ctx.fill(); ctx.restore(); } });
	    let pulse = Math.sin(Date.now() / 100) * 5; ctx.fillStyle = isBonusActive ? `rgba(255, 0, 255, ${0.6 + Math.sin(Date.now()/100)*0.3})` : `rgba(5, 255, 0, ${0.6 + Math.sin(Date.now()/100)*0.3})`; ctx.fillRect(lvl.exit.x - pulse/2, lvl.exit.y - pulse/2, lvl.exit.width + pulse, lvl.exit.height + pulse); ctx.strokeStyle = isBonusActive ? '#ff00ff' : '#05ff00'; ctx.lineWidth = 3; ctx.strokeRect(lvl.exit.x, lvl.exit.y, lvl.exit.width, lvl.exit.height);
	    ctx.fillStyle = player.color; ctx.fillRect(player.x, player.y, player.width, player.height); ctx.fillStyle = '#ffff00'; if (player.vx >= 0) { ctx.fillRect(player.x + 12, player.y + 6, 4, 4); } else { ctx.fillRect(player.x + 4, player.y + 6, 4, 4); }
	}
	function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); } gameLoop();
</script>
