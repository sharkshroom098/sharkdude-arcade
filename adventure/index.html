
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atari 2600: Adventure</title>
</head>
<body style="background-color:#020202; color:#ffffff; font-family:'Courier New',monospace; display:flex; flex-direction:column; align-items:center; justify-content:center; margin:0; height:100vh; overflow:hidden; touch-action:none; -webkit-user-select:none; user-select:none;" onload="startSystem()">

    <div id="consoleWrapper" style="background:#1a1a1a; border:4px solid #333333; border-radius:6px; padding:8px; display:flex; flex-direction:column; align-items:center; box-shadow:0 0 20px rgba(0,0,0,0.9);">
        <div id="hardwarePanel" style="width:320px; background:#0c0c0c; border:2px solid #222222; display:flex; flex-direction:column; gap:6px; padding:6px 0; margin-bottom:6px; align-items:center;">
            <div style="display:flex; justify-content:space-around; width:100%; align-items:center;">
                <button style="background:#2a2a2a; color:#ffaa00; border:1px solid #444444; padding:3px 8px; font-size:9px; font-family:inherit; font-weight:bold; cursor:pointer;" onclick="triggerConsoleSelect()">Game Select</button>
                <div id="gameNumberDisplay" style="color:#00ffff; font-weight:bold; font-size:12px;">GAME 1</div>
                <button style="background:#2a2a2a; color:#ffaa00; border:1px solid #444444; padding:3px 8px; font-size:9px; font-family:inherit; font-weight:bold; cursor:pointer;" onclick="triggerConsoleReset()">Game Reset</button>
            </div>
            <div style="display:flex; justify-content:space-around; width:100%; align-items:center;">
                <div style="font-size:8px; color:#888; display:flex; gap:4px; align-items:center;">
                    <span>DIFF A (DRAGONS)</span>
                    <button id="diffA" style="background:#2a2a2a; color:#ffaa00; border:1px solid #444444; padding:3px 8px; font-size:9px; font-family:inherit; font-weight:bold; cursor:pointer;" onclick="toggleDiffA()">B (EASY)</button>
                </div>
            </div>
        </div>

        <canvas id="screen" width="320" height="240" style="background-color:#000000; image-rendering:pixelated; image-rendering:crisp-edges; border:2px solid #111111; width:320px; height:240px;"></canvas>
        
        <div id="controllerArea" style="width:320px; height:140px; margin-top:6px; display:flex; justify-content:center; align-items:center; position:relative;">
            <div id="joystickBase" style="width:100px; height:100px; background:#111111; border:4px solid #222222; border-radius:50%; position:relative; display:flex; justify-content:center; align-items:center; box-shadow:inset 0 0 10px #000;">
                <div id="joystickStick" style="width:36px; height:36px; background:#2b2b2b; border:3px solid #ff2222; border-radius:50%; position:absolute; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.6); pointer-events:none;"></div>
            </div>
        </div>
    </div>

    <div id="injectWrapper"></div>
    <script id="engineRoom">
        function startSystem() {
            const canvas = document.getElementById("screen");
            const ctx = canvas.getContext("2d");
            const gameDisplay = document.getElementById("gameNumberDisplay");
            const diffAButton = document.getElementById("diffA");

            let loopId = null;
            const keys = {};
            let gameVariation = 1; 
            let difficultyA = "B"; 

            window.addEventListener("keydown", e => { 
                keys[e.code] = true; 
                if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","KeyW","KeyA","KeyS","KeyD"].includes(e.code)) e.preventDefault();
                if(e.code === "KeyF") triggerConsoleSelect();
                if(e.code === "KeyR") triggerConsoleReset();
            });
            window.addEventListener("keyup", e => { keys[e.code] = false; });

            const stick = document.getElementById("joystickStick");
            const base = document.getElementById("joystickBase");
            let joystickActive = false;

            const handleStickMove = (clientX, clientY) => {
                const baseRect = base.getBoundingClientRect();
                const centerX = baseRect.left + baseRect.width / 2;
                const centerY = baseRect.top + baseRect.height / 2;
                let dx = clientX - centerX; 
                let dy = clientY - centerY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const maxRadius = 30;

                if (dist > maxRadius) { dx = (dx / dist) * maxRadius; dy = (dy / dist) * maxRadius; }
                stick.style.transform = "translate(" + dx + "px, " + dy + "px)";

                keys["ArrowLeft"] = dx < -8; keys["ArrowRight"] = dx > 8;
                keys["ArrowUp"] = dy < -8; keys["ArrowDown"] = dy > 8;
            };

            base.addEventListener("touchstart", e => {
                joystickActive = true; 
                handleStickMove(e.touches[0].clientX, e.touches[0].clientY);
            }, {passive: false});

            window.addEventListener("touchmove", e => {
                if (!joystickActive) return; e.preventDefault();
                handleStickMove(e.touches[0].clientX, e.touches[0].clientY);
            }, {passive: false});

            base.addEventListener("mousedown", e => {
                joystickActive = true;
                handleStickMove(e.clientX, e.clientY);
            });

            window.addEventListener("mousemove", e => {
                if (!joystickActive) return;
                handleStickMove(e.clientX, e.clientY);
            });

            const resetJoystickStick = () => {
                joystickActive = false; stick.style.transform = "translate(0px, 0px)";
                keys["ArrowLeft"] = false; keys["ArrowRight"] = false; keys["ArrowUp"] = false; keys["ArrowDown"] = false;
            };
            window.addEventListener("touchend", resetJoystickStick);
            window.addEventListener("touchcancel", resetJoystickStick);
            window.addEventListener("mouseup", resetJoystickStick);

            function checkCollision(r1, r2) {
                return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y;
            }

            window.triggerConsoleSelect = function() {
                gameVariation++; if (gameVariation > 3) gameVariation = 1;
                gameDisplay.innerText = "GAME " + gameVariation; triggerConsoleReset();
            }

            window.toggleDiffA = function() {
                if (difficultyA === "B") { difficultyA = "A"; diffAButton.innerText = "A (HARD)"; } 
                else { difficultyA = "B"; diffAButton.innerText = "B (EASY)"; }
                adv.dragon.speed = (difficultyA === "A") ? 0.65 : 0.35;
            }

            const ATARI_PALETTE = {
                BG_BLUE: "#000054", BG_GREEN: "#003400", BG_DARK: "#000000",
                WALL_GOLD: "#A87400", WALL_GREEN: "#008800", WALL_GRAY: "#A8A8A8",
                HERO_CYAN: "#00D8D8", KEY_GOLD: "#D8A800", CHALICE_FLASH: ["#D800D8","#00D800","#D8D800","#D80000"],
                DRAGON_GREEN: "#00A800"
            };

            const adv = {
                player: { x: 156, y: 65, w: 6, h: 6, baseSpeed: 1.2 },
                currentRoom: "START", heldItem: null, status: "PLAY", flashTick: 0,
                rooms: {
                    START: { bg: ATARI_PALETTE.BG_BLUE, wallColor: ATARI_PALETTE.WALL_GOLD, exits: { left: "MAZE_WEST", right: "FIELDS", up: "CASTLE_INT" }, walls: [{x: 0, y: 88, w: 320, h: 8}, {x: 0, y: 0, w: 110, h: 32}, {x: 210, y: 0, w: 110, h: 32}], gate: { x: 110, y: 30, w: 100, h: 4, open: false, color: "#D8D800" } },
                    FIELDS: { bg: ATARI_PALETTE.BG_GREEN, wallColor: ATARI_PALETTE.WALL_GREEN, exits: { left: "START", right: "MAZE_EAST" }, walls: [{x: 0, y: 0, w: 320, h: 8}, {x: 0, y: 88, w: 320, h: 8}] },
                    MAZE_EAST: { bg: ATARI_PALETTE.BG_DARK, wallColor: ATARI_PALETTE.WALL_GOLD, exits: { left: "FIELDS", right: "MAZE_WEST" }, walls: [{x: 0, y: 0, w: 320, h: 8}, {x: 0, y: 88, w: 320, h: 8}, {x: 40, y: 8, w: 8, h: 50}, {x: 180, y: 40, w: 100, h: 8}] },
                    MAZE_WEST: { bg: ATARI_PALETTE.BG_DARK, wallColor: ATARI_PALETTE.WALL_GOLD, exits: { left: "MAZE_EAST", right: "START" }, walls: [{x: 0, y: 0, w: 320, h: 8}, {x: 0, y: 88, w: 320, h: 8}, {x: 60, y: 30, w: 200, h: 8}, {x: 156, y: 38, w: 8, h: 30}] },
                    CASTLE_INT: { bg: ATARI_PALETTE.BG_DARK, wallColor: ATARI_PALETTE.WALL_GRAY, exits: { down: "START" }, walls: [{x: 0, y: 0, w: 320, h: 8}, {x: 0, y: 8, w: 8, h: 88}, {x: 312, y: 8, w: 8, h: 88}, {x: 8, y: 88, w: 102, h: 8}, {x: 210, y: 88, w: 102, h: 8}], pedestal: { x: 150, y: 40, w: 20, h: 4 } },
                    SECRET_ROOM: { bg: "#440044", wallColor: "#ff00ff", exits: { left: "START" }, walls: [{x: 0, y: 0, w: 320, h: 8}, {x: 0, y: 88, w: 320, h: 8}, {x: 312, y: 8, w: 8, h: 80}] }
                },
                items: {
                    KEY: { x: 200, y: 50, w: 10, h: 4, color: ATARI_PALETTE.KEY_GOLD, room: "FIELDS", carried: false, type: "KEY" },
                    CHALICE: { x: 120, y: 50, w: 8, h: 10, color: "#ffffff", room: "MAZE_WEST", carried: false, type: "CHALICE" },
                    SWORD: { x: 60, y: 50, w: 12, h: 4, color: "#a8a8a8", room: "MAZE_EAST", carried: false, type: "SWORD" },
                    DOT: { x: 80, y: 65, w: 2, h: 2, color: "#a8a8a8", room: "MAZE_WEST", carried: false, type: "DOT" }
                },
                dragon: { x: 80, y: 40, w: 22, h: 14, color: ATARI_PALETTE.DRAGON_GREEN, room: "MAZE_WEST", alive: true, speed: 0.35 }
            };
            window.triggerConsoleReset = function() {
                cancelAnimationFrame(loopId);
                adv.rooms.START.exits.right = "FIELDS";
                adv.player.x = 156; adv.player.y = 65; adv.currentRoom = "START"; adv.heldItem = null; adv.status = "PLAY";
                adv.rooms.START.gate.open = false; 
                for (let id in adv.items) { adv.items[id].carried = false; }
                adv.dragon.alive = true;
                adv.dragon.speed = (difficultyA === "A") ? 0.65 : 0.35;

                if (gameVariation === 3) {
                    const structuralRooms = ["FIELDS", "MAZE_EAST", "MAZE_WEST", "CASTLE_INT"];
                    for (let id in adv.items) {
                        adv.items[id].room = structuralRooms[Math.floor(Math.random() * 4)];
                        adv.items[id].x = 30 + Math.random() * 240; adv.items[id].y = 40 + Math.random() * 40;
                    }
                    adv.dragon.room = structuralRooms[Math.floor(Math.random() * 4)];
                    adv.dragon.x = 80; adv.dragon.y = 40;
                } else {
                    adv.items.KEY.room = "FIELDS"; adv.items.KEY.x = 200; adv.items.KEY.y = 50;
                    adv.items.CHALICE.room = "MAZE_WEST"; adv.items.CHALICE.x = 120; adv.items.CHALICE.y = 50;
                    adv.items.SWORD.room = "MAZE_EAST"; adv.items.SWORD.x = 60; adv.items.SWORD.y = 50;
                    adv.items.DOT.room = "MAZE_WEST"; adv.items.DOT.x = 80; adv.items.DOT.y = 65;
                    adv.dragon.room = "MAZE_WEST"; adv.dragon.x = 80; adv.dragon.y = 40;
                }
                loopEngine();
            }

            function loopEngine() { updateAdventure(); drawAdventure(); loopId = requestAnimationFrame(loopEngine); }

            function updateAdventure() {
                if (adv.status !== "PLAY") return;
                let p = adv.player; let oldX = p.x; let oldY = p.y; let room = adv.rooms[adv.currentRoom];
                
                let currentSpeed = p.heldItem ? p.baseSpeed * 0.75 : p.baseSpeed;

                if (keys["ArrowLeft"] || keys["KeyA"]) p.x -= currentSpeed;
                if (keys["ArrowRight"] || keys["KeyD"]) p.x += currentSpeed;
                if (keys["ArrowUp"] || keys["KeyW"]) p.y -= currentSpeed;
                if (keys["ArrowDown"] || keys["KeyS"]) p.y += currentSpeed;
                
                let borderTransformed = false;
                if (p.x < -4) { if (room.exits.left) { adv.currentRoom = room.exits.left; p.x = 310; borderTransformed = true; } else p.x = oldX; }
                if (p.x > 316) { if (room.exits.right) { adv.currentRoom = room.exits.right; p.x = 2; borderTransformed = true; } else p.x = oldX; }
                if (p.y < -4) { if (room.exits.up) { adv.currentRoom = room.exits.up; p.y = 80; borderTransformed = true; } else p.y = oldY; }
                if (p.y > 92) { if (room.exits.down) { adv.currentRoom = room.exits.down; p.y = 2; borderTransformed = true; } else p.y = oldY; }
                
                if (borderTransformed && p.heldItem) {
                    adv.items[p.heldItem].room = adv.currentRoom;
                }

                let collidedWithWall = false;
                room.walls.forEach(w => { if (checkCollision(p, {x: w.x, y: w.y, w: w.w, h: w.h})) { p.x = oldX; p.y = oldY; collidedWithWall = true; } });
                
                if (adv.currentRoom === "START" && !adv.rooms.START.gate.open) {
                    let g = adv.rooms.START.gate;
                    if (checkCollision(p, {x: g.x, y: g.y, w: g.w, h: g.h})) {
                        if (p.heldItem === "KEY") adv.rooms.START.gate.open = true; else { p.x = oldX; p.y = oldY; collidedWithWall = true; }
                    }
                }
                
                if (collidedWithWall && p.heldItem) {
                    let it = adv.items[p.heldItem]; it.carried = false; it.room = adv.currentRoom;
                    it.x = p.x + (p.x > oldX ? -14 : 14); it.y = p.y + (p.y > oldY ? -14 : 14); p.heldItem = null;
                }
                
                if (adv.currentRoom === "START" && adv.items.DOT.room === "START" && !adv.items.DOT.carried) {
                    adv.rooms.START.exits.right = "SECRET_ROOM";
                } else if (adv.currentRoom === "START" && adv.rooms.START.exits.right === "SECRET_ROOM") {
                    adv.rooms.START.exits.right = "FIELDS";
                }

                let d = adv.dragon;
                if (d.alive && d.room === adv.currentRoom) {
                    if (p.x < d.x) d.x -= d.speed; else d.x += d.speed; if (p.y < d.y) d.y -= d.speed; else d.y += d.speed;

                    if (p.heldItem === "SWORD" && checkCollision(p, {x: d.x, y: d.y, w: d.w, h: d.h})) {
                        d.alive = false; 
                    } else if (checkCollision(p, {x: d.x, y: d.y, w: d.w, h: d.h})) {
                        adv.status = "DEAD";
                    }
                }

                for (let id in adv.items) {
                    let it = adv.items[id];
                    if (it.room === adv.currentRoom && !it.carried && !p.heldItem) { 
                        if (checkCollision(p, {x: it.x, y: it.y, w: it.w, h: it.h})) { it.carried = true; p.heldItem = id; } 
                    }
                    if (it.carried) { it.x = p.x; it.y = p.y; } 
                }

                if (adv.currentRoom === "CASTLE_INT" && p.heldItem === "CHALICE") {
                    if (checkCollision(p, {x: room.pedestal.x, y: room.pedestal.y, w: room.pedestal.w, h: room.pedestal.h})) adv.status = "WIN";
                }
                adv.flashTick++;
            }

            function drawAdventure() {
                let room = adv.rooms[adv.currentRoom]; ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = room.bg; ctx.fillRect(0, 0, 320, 96); ctx.fillStyle = room.wallColor; room.walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));
                if (adv.currentRoom === "START" && !adv.rooms.START.gate.open) { ctx.fillStyle = adv.rooms.START.gate.color; ctx.fillRect(adv.rooms.START.gate.x, adv.rooms.START.gate.y, adv.rooms.START.gate.w, adv.rooms.START.gate.h); }
                if (adv.currentRoom === "CASTLE_INT") { ctx.fillStyle = "#ffffff"; ctx.fillRect(room.pedestal.x, room.pedestal.y, room.pedestal.w, room.pedestal.h); }
                
                if (adv.currentRoom === "SECRET_ROOM") {
                    ctx.fillStyle = ATARI_PALETTE.CHALICE_FLASH[Math.floor(adv.flashTick / 4) % 4];
                    ctx.font = "8px monospace"; ctx.fillText("CREATED BY", 130, 45); ctx.fillText("WARREN ROBINETT", 110, 55);
                }

                for (let id in adv.items) {
                    let it = adv.items[id];
                    if (it.room === adv.currentRoom || it.carried) {
                        if (it.type === "CHALICE") {
                            ctx.fillStyle = ATARI_PALETTE.CHALICE_FLASH[Math.floor(adv.flashTick / 4) % 4];
                            ctx.fillRect(it.x, it.y, 8, 2); ctx.fillRect(it.x + 2, it.y + 2, 4, 6); ctx.fillRect(it.x, it.y + 8, 8, 2);
                        } else if (it.type === "DOT") {
                            ctx.fillStyle = it.color; ctx.fillRect(it.x, it.y, it.w, it.h);
                        } else if (it.type === "SWORD") {
                            ctx.fillStyle = it.color; ctx.fillRect(it.x, it.y + 1, 12, 2); ctx.fillRect(it.x + 2, it.y, 2, 4); 
                        } else { 
                            ctx.fillStyle = it.color; ctx.fillRect(it.x, it.y, it.w, it.h); ctx.fillRect(it.x + 2, it.y + 4, 2, 4); 
                        }
                    }
                }
                let d = adv.dragon;
                if (d.alive && d.room === adv.currentRoom) { ctx.fillStyle = d.color; ctx.fillRect(d.x, d.y, d.w, d.h); ctx.fillRect(d.x + 14, d.y - 6, 6, 8); ctx.fillStyle = "#000"; ctx.fillRect(d.x + 16, d.y - 4, 2, 2); }
                
                ctx.fillStyle = ATARI_PALETTE.HERO_CYAN; ctx.fillRect(adv.player.x, adv.player.y, adv.player.w, adv.player.h);

                ctx.fillStyle = "#111"; ctx.fillRect(0, 96, 320, 144); ctx.fillStyle = "#fff"; ctx.font = "8px monospace";
                ctx.fillText("ROOM: " + adv.currentRoom, 10, 115); ctx.fillText("CARRYING: " + (adv.heldItem ? adv.heldItem : "NONE"), 10, 125);
                if (adv.status === "WIN") { ctx.fillStyle = "rgba(0,0,0,0.9)"; ctx.fillRect(0,0,320,240); ctx.fillStyle = "#ff5"; ctx.font = "12px monospace"; ctx.fillText("CONGRATULATIONS!", 100, 50); ctx.font = "8px monospace"; ctx.fillStyle = "#fff"; ctx.fillText("PULL THE GAME RESET LEVER TO START AGAIN.", 45, 80); }
                else if (adv.status === "DEAD") { ctx.fillStyle = "rgba(0,0,0,0.95)"; ctx.fillRect(0,0,320,240); ctx.fillStyle = "#f33"; ctx.font = "12px monospace"; ctx.fillText("GAME OVER", 120, 50); ctx.font = "8px monospace"; ctx.fillStyle = "#fff"; ctx.fillText("SLAIN BY DRAGON. PULL RESET SWITCH TO REBOOT.", 40, 80); }
            }

            triggerConsoleReset();
        }
    </script>
</body>
</html>
