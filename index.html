<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sharkdude's Arcade</title>
  <style>
    @import url('https://googleapis.com');

    /* RETRO ARCADE PITCH BLACK OVERRIDE */
    html, body {
      background-color: #05000a !important;
      background-image: 
        linear-gradient(rgba(255, 0, 127, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 0, 127, 0.04) 1px, transparent 1px) !important;
      background-size: 35px 35px !important;
      margin: 0 !important;
      padding: 0 !important;
      font-family: 'Press Start 2P', 'Courier Prime', monospace !important;
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
      justify-content: flex-start !important;
      min-height: 100vh !important;
      color: #39ff14 !important;
      box-sizing: border-box !important;
    }

    /* NEON CYAN HEADER MARQUEE SIGN */
    .arcade-header {
      margin: 30px 0 20px 0 !important;
      text-align: center !important;
      width: 100% !important;
      padding: 0 20px !important;
      box-sizing: border-box !important;
    }
    
    .arcade-title {
      font-size: 4vw !important;
      min-size: 20px;
      font-weight: bold !important;
      color: #00ffff !important;
      text-transform: uppercase !important;
      letter-spacing: -1px !important;
      text-shadow: 
        0 0 8px #00ffff,
        0 0 15px #00ffff,
        0 0 30px #00ffff,
        0 0 60px #006666 !important;
      animation: neonFlicker 4s infinite alternate !important;
      margin: 0 !important;
    }

    @keyframes neonFlicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
        text-shadow: 0 0 8px #00ffff, 0 0 15px #00ffff, 0 0 30px #00ffff, 0 0 60px #006666;
        opacity: 1;
      }
      20%, 24%, 55% {
        text-shadow: none;
        opacity: 0.7;
      }
    }

    /* EDGE-TO-EDGE LIQUID ARCHITECTURE */
    .dashboard-grid {
      display: grid !important;
      grid-template-columns: repeat(2, 1fr) !important;
      gap: 2vw !important;
      width: 100% !important;
      padding: 2vw !important;
      box-sizing: border-box !important;
      margin-bottom: 40px !important;
    }

    /* ROUNDED RECTANGLE INTERACTIVE GAME TILES */
    .game-card {
      text-decoration: none !important;
      display: flex !important;
      flex-direction: column !important;
      justify-content: center !important;
      align-items: center !important;
      border-radius: 1.5vw !important;
      aspect-ratio: 16/9 !important; 
      background-size: cover !important;
      background-position: center !important;
      padding: 2vw !important;
      box-sizing: border-box !important;
      position: relative !important;
      overflow: hidden !important;
      transition: transform 0.1s steps(3), box-shadow 0.1s steps(3) !important;
    }

    /* ARCADE FRAME NEONS (NO CYAN ALLOWED) */
    .game-card:nth-child(1) { 
      background-color: #12001a !important; background-image: linear-gradient(135deg, #4d0000, #12001a), url('adventure.png') !important;
      border: 0.35vw solid #ff003c !important; box-shadow: 0 0 1.2vw #ff003c !important; 
    }
    .game-card:nth-child(2) { 
      background-color: #12001a !important; background-image: linear-gradient(135deg, #001144, #12001a), url('fighter-pilot.png') !important;
      border: 0.35vw solid #0066ff !important; box-shadow: 0 0 1.2vw #0066ff !important; /* Pure Cobalt Blue */
    }
    .game-card:nth-child(3) { 
      background-color: #12001a !important; background-image: linear-gradient(135deg, #004422, #12001a), url('neon-snake.png') !important;
      border: 0.35vw solid #39ff14 !important; box-shadow: 0 0 1.2vw #39ff14 !important; 
    }
    .game-card:nth-child(4) { 
      background-color: #12001a !important; background-image: linear-gradient(135deg, #443300, #12001a), url('2048.png') !important;
      border: 0.35vw solid #ffaa00 !important; box-shadow: 0 0 1.2vw #ffaa00 !important; 
    }
    .game-card:nth-child(5) { 
      background-color: #12001a !important; background-image: linear-gradient(135deg, #440033, #12001a), url('asteroid-evader.png') !important;
      border: 0.35vw solid #ff007f !important; box-shadow: 0 0 1.2vw #ff007f !important; 
    }

    /* Hover Scale Jumps */
    .game-card:hover { transform: scale(1.02) !important; }
    .game-card:nth-child(1):hover { box-shadow: 0 0 2.5vw #ff003c !important; }
    .game-card:nth-child(2):hover { box-shadow: 0 0 2.5vw #0066ff !important; }
    .game-card:nth-child(3):hover { box-shadow: 0 0 2.5vw #39ff14 !important; }
    .game-card:nth-child(4):hover { box-shadow: 0 0 2.5vw #ffaa00 !important; }
    .game-card:nth-child(5):hover { box-shadow: 0 0 2.5vw #ff007f !important; }

    /* Contrast Masking */
    .game-card::before {
      content: '' !important;
      position: absolute !important;
      top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important;
      background: rgba(0, 0, 0, 0.65) !important;
      z-index: 1 !important;
    }

    .card-content {
      position: relative !important;
      z-index: 2 !important;
      text-align: center !important;
      display: flex !important;
      flex-direction: column !important;
      justify-content: center !important;
      align-items: center !important;
      width: 100% !important;
      height: 100% !important;
    }

    /* NEON CYAN WORDING INSIDE THE ACTIVE BOXES */
    .game-title {
      color: #00ffff !important;
      font-size: 1.8vw !important;
      font-weight: bold !important;
      text-transform: uppercase !important;
      text-shadow: 
        0 0 4px #00ffff,
        2px 2px 0px #000000 !important;
      margin: 0 !important;
      letter-spacing: 0px !important;
      line-height: 1.4 !important;
    }

    /* NEON CYAN WORDING INSIDE THE PLACEHOLDER BOXES */
    .placeholder-card {
      border: 0.35vw dashed #440033 !important;
      border-radius: 1.5vw !important;
      aspect-ratio: 16/9 !important;
      display: flex !important;
      justify-content: center !important;
      align-items: center !important;
      color: #00ffff !important;
      font-weight: bold !important;
      font-size: 1.5vw !important; 
      text-transform: uppercase !important;
      background-color: #0d0014 !important;
      text-shadow: 
        0 0 4px #00ffff,
        2px 2px 0px #000000 !important;
      box-shadow: inset 0 0 1vw rgba(255, 0, 127, 0.05) !important;
      animation: coinBlink 3s infinite steps(2) !important;
    }

    @keyframes coinBlink {
      0% { opacity: 1; border-color: #440033; }
      50% { opacity: 0.5; border-color: #ff007f; }
    }

    /* Responsive scaling protections for mobile devices */
    @media (max-width: 600px) {
      .arcade-title { font-size: 24px !important; }
      .game-title { font-size: 11px !important; text-shadow: 0 0 2px #00ffff, 1px 1px 0px #000 !important; }
      .placeholder-card { font-size: 9px !important; text-shadow: 0 0 2px #00ffff, 1px 1px 0px #000 !important; }
      .dashboard-grid { gap: 12px !important; padding: 12px !important; }
      .game-card, .placeholder-card { border-radius: 8px !important; border-width: 2px !important; }
    }
  </style>
</head>
<body>

  <header class="arcade-header">

  </header>

  <div class="dashboard-grid">

  </div>

</body>
</html>
