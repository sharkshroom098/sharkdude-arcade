<!-- Games Collection Dashboard Grid -->
<div style="display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; padding: 20px; background-color: #0d0d0d; border-radius: 16px; font-family: sans-serif;">

  <!-- 1. Adventure -->
  <div style="background-color: #1a1a1a; border-radius: 12px; padding: 20px; width: 280px; text-align: center; color: #ffffff; border: 1px solid #333; display: flex; flex-direction: column; justify-content: space-between;">
    <div>
      <div style="background-color: #000033; height: 180px; border-radius: 8px; position: relative; border: 4px solid #b27a00; overflow: hidden;">
        <div style="background-color: #b27a00; height: 35px; width: 100%; position: absolute; top: 0; left: 0;"></div>
        <div style="background-color: #b27a00; height: 35px; width: 35%; position: absolute; top: 0; left: 0; border-right: 4px solid #ffff00; border-bottom: 4px solid #ffff00; background-color: #000033;"></div>
        <div style="background-color: #b27a00; height: 35px; width: 35%; position: absolute; top: 0; right: 0; border-left: 4px solid #ffff00; border-bottom: 4px solid #ffff00; background-color: #000033;"></div>
        <div style="background-color: #00ffff; width: 12px; height: 12px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);"></div>
        <div style="background-color: #b27a00; height: 15px; width: 100%; position: absolute; bottom: 0; left: 0;"></div>
      </div>
      <h2 style="font-size: 22px; margin: 20px 0 10px 0; letter-spacing: 1px; text-transform: uppercase;">Adventure</h2>
    </div>
    <div style="margin-top: 15px; background-color: #e51b24; color: white; padding: 10px; border-radius: 6px; font-weight: bold; font-size: 14px;">
      Adventure - Atari 2600
    </div>
  </div>

  <!-- 2. Fighter Pilot -->
  <div style="background-color: #1a1a1a; border-radius: 12px; padding: 20px; width: 280px; text-align: center; color: #ffffff; border: 1px solid #333; display: flex; flex-direction: column; justify-content: space-between;">
    <div>
      <div style="background-color: #0c0014; height: 180px; border-radius: 8px; position: relative; border: 2px solid #5a0032; background-image: linear-gradient(rgba(40,0,60,0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(40,0,60,0.3) 1px, transparent 1px); background-size: 20px 20px;">
        <div style="color: #00ffff; font-size: 24px; position: absolute; top: 15px; left: 20px; transform: rotate(180deg);">▲</div>
        <div style="color: #00ffff; font-size: 24px; position: absolute; top: 15px; right: 20px; transform: rotate(180deg);">▲</div>
        <div style="color: #00ffff; font-weight: bold; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); letter-spacing: 4px;">||</div>
        <div style="color: #00ff00; font-size: 32px; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);">▲</div>
      </div>
      <h2 style="font-size: 22px; margin: 20px 0 10px 0; letter-spacing: 1px; text-transform: uppercase;">Fighter Pilot</h2>
    </div>
    <div style="margin-top: 15px; background-color: #0088cc; color: white; padding: 10px; border-radius: 6px; font-weight: bold; font-size: 14px;">
      Fighter Pilot
    </div>
  </div>

  <!-- 3. Neon Snake -->
  <div style="background-color: #1a1a1a; border-radius: 12px; padding: 20px; width: 280px; text-align: center; color: #ffffff; border: 1px solid #333; display: flex; flex-direction: column; justify-content: space-between;">
    <div>
      <div style="background-color: #050b0b; height: 180px; border-radius: 8px; position: relative; border: 2px solid #00ffff; background-image: linear-gradient(rgba(0,50,50,0.2) 1px, transparent 1px), linear-gradient(90deg, rgba(0,50,50,0.2) 1px, transparent 1px); background-size: 15px 15px;">
        <div style="display: flex; position: absolute; top: 20px; right: 20px; gap: 2px;">
          <div style="background-color: #00ffff; width: 14px; height: 14px; box-shadow: 0 0 8px #00ffff;"></div>
          <div style="background-color: #00ffff; width: 14px; height: 14px; box-shadow: 0 0 8px #00ffff;"></div>
          <div style="background-color: #00ffff; width: 14px; height: 14px; box-shadow: 0 0 8px #00ffff;"></div>
        </div>
        <div style="background-color: #ff00ff; width: 14px; height: 14px; position: absolute; bottom: 15px; left: 60%; box-shadow: 0 0 8px #ff00ff;"></div>
      </div>
      <h2 style="font-size: 22px; margin: 20px 0 10px 0; letter-spacing: 1px; text-transform: uppercase;">Neon Snake</h2>
    </div>
    <div style="margin-top: 15px; background-color: #00ffcc; color: #1a1a1a; padding: 10px; border-radius: 6px; font-weight: bold; font-size: 14px;">
      Neon Snake
    </div>
  </div>

  <!-- 4. 2048 -->
  <div style="background-color: #1a1a1a; border-radius: 12px; padding: 20px; width: 280px; text-align: center; color: #ffffff; border: 1px solid #333; display: flex; flex-direction: column; justify-content: space-between;">
    <div>
      <div style="background-color: #100518; height: 180px; border-radius: 8px; border: 3px solid #ff007f; display: grid; grid-template-columns: repeat(4, 1px); justify-content: center; align-content: center; gap: 38px; padding: 10px; box-sizing: border-box;">
        <div style="background-color: #ffcc00; width: 32px; height: 32px; color: black; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; border-radius: 4px; margin-left: -15px;">8</div>
        <div style="background-color: #ff6600; width: 32px; height: 32px; color: white; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; border-radius: 4px; margin-left: -5px;">4</div>
        <div style="background-color: #ff3366; width: 32px; height: 32px; color: white; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; border-radius: 4px; margin-left: 5px;">2</div>
        <div style="background-color: #ff3366; width: 32px; height: 32px; color: white; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; border-radius: 4px; transform: translate(-108px, 40px);">2</div>
        <div style="background-color: #00ff66; width: 32px; height: 32px; color: black; font-weight: bold; font-size: 12px; display: flex; align-items: center; justify-content: center; border-radius: 4px; transform: translate(-40px, 40px);">32</div>
        <div style="background-color: #ffcc00; width: 32px; height: 32px; color: black; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; border-radius: 4px; transform: translate(-30px, 40px);">8</div>
      </div>
      <h2 style="font-size: 22px; margin: 20px 0 10px 0; letter-spacing: 1px; text-transform: uppercase;">2048</h2>
    </div>
    <div style="margin-top: 15px; background-color: #edc22e; color: white; padding: 10px; border-radius: 6px; font-weight: bold; font-size: 14px;">
      2048
    </div>
  </div>

  <!-- 5. Asteroid Evader -->
  <div style="background-color: #1a1a1a; border-radius: 12px; padding: 20px; width: 280px; text-align: center; color: #ffffff; border: 1px solid #333; display: flex; flex-direction: column; justify-content: space-between;">
    <div>
      <div style="background-color: #08000c; height: 180px; border-radius: 8px; position: relative; border: 2px solid #ff007f;">
        <div style="border: 2px solid #ff007f; width: 30px; height: 30px; position: absolute; top: 15px; left: 45%; padding: 2px; box-sizing: border-box; color: #ff007f; font-size: 8px; display: flex; flex-wrap: wrap; gap: 2px;"><div>▫</div><div>▫</div><div>▫</div></div>
        <div style="color: #00ffff; font-size: 28px; position: absolute; bottom: 15px; left: 45%;">▲</div>
        <div style="border: 2px solid #ff007f; width: 25px; height: 25px; position: absolute; bottom: 20px; right: 25px; padding: 2px; box-sizing: border-box; color: #ff007f; font-size: 6px; display: flex; flex-wrap: wrap; gap: 1px;"><div>▫</div><div>▫</div></div>
      </div>
      <h2 style="font-size: 22px; margin: 20px 0 10px 0; letter-spacing: 1px; text-transform: uppercase;">Asteroid Evader</h2>
    </div>
    <div style="margin-top: 15px; background-color: #ff007f; color: white; padding: 10px; border-radius: 6px; font-weight: bold; font-size: 14px;">
      Asteroid Evader
    </div>
  </div>

</div>
