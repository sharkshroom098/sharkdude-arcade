<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Neon Cyan S Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://w3.org viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22black%22/><text x=%2250%22 y=%2272%22 font-family=%22Impact, Arial Black, sans-serif%22 font-size=%2275%22 font-weight=%22900%22 fill=%22%2300ffff%22 text-anchor=%22middle%22 style=%22filter: drop-shadow(0px 0px 10px %2300ffff) drop-shadow(0px 0px 20px %2300ffff);%22>S</text></svg>">

    <title>Sharkdude's Arcade</title>
    <style>
        /* Reset and Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000000;
            /* Dark pink neon grid matrix background effect */
            background-image: 
                linear-gradient(rgba(255, 20, 147, 0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 20, 147, 0.07) 1px, transparent 1px);
            background-size: 40px 40px;
            font-family: 'Courier New', Courier, monospace;
            color: #fffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header Sign - Solid Un-flashing Neon Cyan Marquee */
        header {
            width: 100%;
            text-align: center;
            padding: 40px 20px;
        }
        h1 {
            font-size: 3rem;
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 
                0 0 5px #00ffff, 
                0 0 10px #00ffff, 
                0 0 20px #00ffff;
        }

        /* Container & Fluid Edge-to-Edge Grid */
        main {
            width: 100%;
            padding: 0 10px;
            flex-grow: 1;
        }
        .grid-container {
            display: grid;
            /* Locked strictly at 2 boxes per row filling 100% fluidly */
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            width: 100%;
        }

        /* Base Card Setup - Chunky Borders & Rounded Rectangles */
        .card {
            background-color: rgba(0, 0, 0, 0.9);
            border-radius: 16px; /* Rounded-rectangle boxes */
            padding: 45px 20px;
            text-align: center;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s ease, filter 0.2s ease;
        }
        .card:hover {
            transform: scale(1.02);
            filter: brightness(1.2);
        }

        /* Custom Neon Glow Themes (No two identical colors touch in 2-column layout) */
        .neon-cyan    { border: 6px solid #00ffff; box-shadow: 0 0 15px #00ffff, inset 0 0 10px rgba(0,255,255,0.3); }
        .neon-green   { border: 6px solid #39ff14; box-shadow: 0 0 15px #39ff14, inset 0 0 10px rgba(57,255,20,0.3); }
        .neon-gold    { border: 6px solid #da9600; box-shadow: 0 0 15px #da9600, inset 0 0 10px rgba(218,150,0,0.3); }
        .neon-pink    { border: 6px solid #ff007f; box-shadow: 0 0 15px #ff007f, inset 0 0 10px rgba(255,0,127,0.3); }
        .neon-red     { border: 6px solid #ff003c; box-shadow: 0 0 15px #ff003c, inset 0 0 10px rgba(255,0,60,0.3); }
        .neon-purple  { border: 6px solid #b000ff; box-shadow: 0 0 15px #b000ff, inset 0 0 10px rgba(176,0,255,0.3); }
        .neon-orange  { border: 6px solid #ff6600; box-shadow: 0 0 15px #ff6600, inset 0 0 10px rgba(255,102,0,0.3); }
        .neon-blue    { border: 6px solid #0066ff; box-shadow: 0 0 15px #0066ff, inset 0 0 10px rgba(0,102,255,0.3); }

        /* Placeholder Cards - Static, Muted Coming Soon slots */
        .card.coming-soon {
            border: 6px solid #333333;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Game Content Titles - Plain White with Heavy 8-bit Block Shadows */
        .title {
            color: #ffffff;
            font-weight: 900;
            font-size: 1.5rem;
            text-transform: uppercase;
            text-shadow: 
                3px 3px 0px #000000, 
                6px 6px 0px rgba(0, 0, 0, 0.9);
            word-wrap: break-word;
            max-width: 100%;
        }
        .coming-soon .title {
            color: #666666;
            text-shadow: 2px 2px 0px #000000;
        }

        /* Footer Dashboard Styling */
        footer {
            width: 100%;
            border-top: 4px solid #00ffff;
            background-color: #000000;
            padding: 25px 20px;
            margin-top: 50px;
            text-align: center;
            box-shadow: 0 -5px 15px rgba(0, 255, 255, 0.2);
        }
        .footer-links {
            display: flex;
            justify-content: center;
        }
        .footer-link {
            color: #00ffff;
            text-decoration: none;
            font-size: 1.1rem;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 4px #00ffff;
            transition: color 0.2s ease, text-shadow 0.2s ease;
        }
        .footer-link:hover {
            color: #ffffff;
            text-shadow: 0 0 8px #00ffff, 0 0 15px #00ffff;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .title { font-size: 1.1rem; }
            .footer-link { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
