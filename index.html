<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Games Dashboard</title>
  <style>
    @import url('https://googleapis.com');

    /* Retro arcade deep space background with subtle neon grid effect */
    body {
      margin: 0;
      padding: 0;
      background-color: #05000a;
      background-image: 
        linear-gradient(rgba(57, 255, 20, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(57, 255, 20, 0.05) 1px, transparent 1px);
      background-size: 20px 20px;
      font-family: 'Press Start 2P', 'Courier Prime', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #39ff14;
    }

    /* Strict 2-column structure with an updated retro gap */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
      width: 100%;
      max-width: 640px;
      padding: 24px;
      box-sizing: border-box;
    }

    /* Base arcade card setup */
    .game-card {
      text-decoration: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 4px;
      aspect-ratio: 3/2;
      background-size: cover;
      background-position: center;
      padding: 12px;
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s steps(4), box-shadow 0.15s steps(4);
    }

    /* VIBRANT 80S ARCADE COLORS: Handled via CSS gradients so they show up instantly */
    .game-card:nth-child(1) { 
      background-color: #e51b24;
      background-image: linear-gradient(135deg, #7a0010, #e51b24), url('adventure.png');
      border: 3px solid #e51b24; 
      box-shadow: 0 0 12px #e51b24; 
    }
    .game-card:nth-child(2) { 
      background-color: #0088cc;
      background-image: linear-gradient(135deg, #003366, #0088cc), url('fighter-pilot.png');
      border: 3px solid #0088cc; 
      box-shadow: 0 0 12px #0088cc; 
    }
    .game-card:nth-child(3) { 
      background-color: #00ffcc;
      background-image: linear-gradient(135deg, #005f4b, #00ffcc), url('neon-snake.png');
      border: 3px solid #00ffcc; 
      box-shadow: 0 0 12px #00ffcc; 
    }
    .game-card:nth-child(4) { 
      background-color: #ffaa00;
      background-image: linear-gradient(135deg, #664400, #ffaa00), url('2048.png');
      border: 3px solid #ffaa00; 
      box-shadow: 0 0 12px #ffaa00; 
    }
    .game-card:nth-child(5) { 
      background-color: #ff007f;
      background-image: linear-gradient(135deg, #660033, #ff007f), url('asteroid-evader.png');
      border: 3px solid #ff007f; 
      box-shadow: 0 0 12px #ff007f; 
    }

    /* Hover updates for the glow response */
    .game-card:hover { transform: scale(1.03); }
    .game-card:nth-child(1):hover { box-shadow: 0 0 25px #e51b24; }
    .game-card:nth-child(2):hover { box-shadow: 0 0 25px #0088cc; }
    .game-card:nth-child(3):hover { box-shadow: 0 0 25px #00ffcc; }
    .game-card:nth-child(4):hover { box-shadow: 0 0 25px #ffaa00; }
    .game-card:nth-child(5):hover { box-shadow: 0 0 25px #ff007f; }

    /* Dark dimming layer to mix images nicely with background colors and text */
    .game-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 1;
    }

    /* Floating content layer */
    .card-content {
      position: relative;
      z-index: 2;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    /* Pixel headlines with shadows */
    .game-title {
      color: #ffffff;
      font-size: 14px;
      font-weight: bold;
      text-transform: uppercase;
      text-shadow: 3px 3px 0px #000;
      margin: 0;
    }

    /* Coin-op button badges */
    .game-btn {
      margin-top: 14px;
      color: white;
      padding: 6px 10px;
      border-radius: 2px;
      font-weight: bold;
      font-size: 8px;
      text-transform: uppercase;
      box-shadow: 2px 2px 0px #000;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    /* 6th box styled as a blinking arcade coin slot placeholder */
    .placeholder-card {
      border: 3px dashed #39ff14;
      border-radius: 4px;
      aspect-ratio: 3/2;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #39ff14;
      font-weight: bold;
      font-size: 10px;
      text-transform: uppercase;
      background-color: #120024;
      box-shadow: 0 0 10px rgba(57, 255, 20, 0.2);
      animation: blink 1.5s infinite steps(2);
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    @media (max-width: 500px) {
      .dashboard-grid { grid-template-columns: 1fr; gap: 16px; }
      .game-title { font-size: 12px; }
      .game-btn { font-size: 7px; }
    }
  </style>
</head>
<body>

  <div class="dashboard-grid">

    <!-- 1. Adventure Card Element (Red Theme) -->
    <a href="adventure.png" target="_blank" class="game-card">
      <div class="card-content">
        <h2 class="game-title">Adventure</h2>
        <div class="game-btn" style="background-color: #e51b24;">Atari 2600</div>
      </div>
    </a>

    <!-- 2. Fighter Pilot Card Element (Blue Theme) -->
    <a href="fighter-pilot.png" target="_blank" class="game-card">
      <div class="card-content">
        <h2 class="game-title">Fighter Pilot</h2>
        <div class="game-btn" style="background-color: #0088cc;">Insert Coin</div>
      </div>
    </a>

    <!-- 3. Neon Snake Card Element (Cyan Theme) -->
    <a href="neon-snake.png" target="_blank" class="game-card">
      <div class="card-content">
        <h2 class="game-title">Neon Snake</h2>
        <div class="game-btn" style="background-color: #00ffcc; color: #1a1a1a;">Play Solo</div>
      </div>
    </a>

    <!-- 4. 2048 Card Element (Gold Theme) -->
    <a href="2048.png" target="_blank" class="game-card">
      <div class="card-content">
        <h2 class="game-title">2048</h2>
        <div class="game-btn" style="background-color: #ffaa00; color: #000;">Hi-Score</div>
      </div>
    </a>

    <!-- 5. Asteroid Evader Card Element (Pink Theme) -->
    <a href="asteroid-evader.png" target="_blank" class="game-card">
      <div class="card-content">
        <h2 class="game-title">Asteroid Evader</h2>
        <div class="game-btn" style="background-color: #ff007f;">Game Start</div>
      </div>
    </a>

    <!-- 6. Sixth Blinking Placeholder Card -->
    <div class="placeholder-card">
      Insert Coin
    </div>

  </div>

</body>
</html>
