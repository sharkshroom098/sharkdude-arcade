<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Games Dashboard</title>
  <style>
    /* Resetting default body parameters for your GitHub page layout */
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f7f9;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* Main layout container keeping a strict 2-column structure matching your image */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      width: 100%;
      max-width: 600px;
      padding: 20px;
      box-sizing: border-box;
    }

    /* Base styling for each custom game rectangle card element */
    .game-card {
      text-decoration: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 24px;
      aspect-ratio: 3/2;
      background-size: cover;
      background-position: center;
      padding: 15px;
      box-sizing: border-box;
      border: 1px solid rgba(0, 0, 0, 0.1);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    /* Smooth scale animation effect when user hovers mouse over a card */
    .game-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    /* Dark dimming veil ensuring text readability over custom bright game visuals */
    .game-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 1;
    }

    /* Making sure content floats above the dark layer background element */
    .card-content {
      position: relative;
      z-index: 2;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    /* Game headline element positioned across the center */
    .game-title {
      color: #ffffff;
      font-size: 20px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
      margin: 0;
    }

    /* Universal style rule configuration for the lower metadata buttons */
    .game-btn {
      margin-top: 12px;
      color: white;
      padding: 6px 14px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    /* Sixth empty box placeholder decoration card element */
    .placeholder-card {
      border: 2px dashed #ccc;
      border-radius: 24px;
      aspect-ratio: 3/2;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #aaa;
      font-weight: bold;
      font-size: 14px;
      background-color: transparent;
    }

    /* Inline background link assignments referencing your specific GitHub files */
    .adventure-bg { background-image: url('adventure.png'); }
    .fighter-bg { background-image: url('fighter-pilot.png'); }
    .neon-bg { background-image: url('neon-snake.png'); }
    .game2048-bg { background-image: url('2048.png'); }
    .asteroid-bg { background-image: url('asteroid-evader.png'); }
  </style>
</head>
<body>

  <!-- Complete 6-Slot Grid Blueprint matching your reference design image completely -->
  <div class="dashboard-grid">

    <!-- 1. Adventure Card Element -->
    <a href="adventure.png" target="_blank" class="game-card adventure-bg">
      <div class="card-content">
        <h2 class="game-title">Adventure</h2>
        <div class="game-btn" style="background-color: #e51b24;">Adventure - Atari 2600</div>
      </div>
    </a>

    <!-- 2. Fighter Pilot Card Element -->
    <a href="fighter-pilot.png" target="_blank" class="game-card fighter-bg">
      <div class="card-content">
        <h2 class="game-title">Fighter Pilot</h2>
        <div class="game-btn" style="background-color: #0088cc;">Fighter Pilot</div>
      </div>
    </a>

    <!-- 3. Neon Snake Card Element -->
    <a href="neon-snake.png" target="_blank" class="game-card neon-bg">
      <div class="card-content">
        <h2 class="game-title">Neon Snake</h2>
        <div class="game-btn" style="background-color: #00ffcc; color: #1a1a1a;">Neon Snake</div>
      </div>
    </a>

    <!-- 4. 2048 Card Element -->
    <a href="2048.png" target="_blank" class="game-card game2048-bg">
      <div class="card-content">
        <h2 class="game-title">2048</h2>
        <div class="game-btn" style="background-color: #edc22e;">2048</div>
      </div>
    </a>

    <!-- 5. Asteroid Evader Card Element -->
    <a href="asteroid-evader.png" target="_blank" class="game-card asteroid-bg">
      <div class="card-content">
        <h2 class="game-title">Asteroid Evader</h2>
        <div class="game-btn" style="background-color: #ff007f;">Asteroid Evader</div>
      </div>
    </a>

    <!-- 6. Sixth Placeholder Card to complete the layout grid symmetry -->
    <div class="placeholder-card">
      Coming Soon
    </div>

  </div>

</body>
</html>
