<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bubble Ring Toss</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body { background: #050510; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; color: #fff; touch-action: none; }
        
        h1 { font-size: 1.8rem; text-transform: uppercase; color: #fff; text-shadow: 0 0 5px #fff, 0 0 10px #ff007f, 0 0 20px #ff007f; margin-bottom: 5px; font-weight: 900; letter-spacing: 2px; }
        .score { font-size: 1.1rem; margin-bottom: 12px; color: #00ffff; text-shadow: 0 0 8px #00ffff; font-weight: bold; }
        
        .console { background: #121224; border: 4px solid #333; width: 320px; height: 475px; border-radius: 20px; padding: 15px; box-shadow: 0 0 25px rgba(255, 0, 127, 0.4), inset 0 0 20px #ff007f55; display: flex; flex-direction: column; align-items: center; position: relative; }
        
        .tank { width: 100%; height: 320px; background: linear-gradient(rgba(26, 11, 46, 0.95), rgba(10, 5, 28, 0.95)), linear-gradient(90deg, rgba(255,0,127,0.15) 1px, transparent 1px), linear-gradient(rgba(255,0,127,0.15) 1px, transparent 1px); background-size: 100% 100%, 20px 20px, 20px 20px; border-radius: 8px; border: 5px solid #00ffff; box-shadow: 0 0 15px #00ffff66, inset 0 0 15px #00ffff33; position: relative; overflow: hidden; }
        .tank::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%); pointer-events: none; z-index: 10; }
        
        .peg { position: absolute; top: 40%; width: 40px; height: 60px; display: flex; flex-direction: column; align-items: center; filter: drop-shadow(0 0 4px #00ffff); }
        .p-l { left: 22%; } .p-r { right: 22%; }
        .p-s { width: 8px; height: 50px; background: #00ffff; border-radius: 2px; }
        .p-h { width: 36px; height: 8px; background: #00ffff; border-radius: 2px; position: absolute; top: 15px; }
        
        canvas { position: absolute; inset: 0; z-index: 5; pointer-events: none; }
        
        .controls { display: flex; justify-content: space-between; width: 100%; margin-top: 18px; padding: 0 10px; }
        .btn { width: 64px; height: 64px; border-radius: 50%; background: #ff007f; border: 3px solid #fff; box-shadow: 0 0 10px #ff007f, inset 0 4px 0 rgba(255,255,255,0.5); cursor: pointer; position: relative; -webkit-tap-highlight-color: transparent; }
        .btn:active { transform: scale(0.92); box-shadow: 0 0 4px #ff007f; }
        .btn::before { content: 'JET'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-weight: 900; font-size: 0.8rem; text-shadow: 0 1px 2px rgba(0,0,0,0.6); }
        
        #win-msg { position: absolute; top: 30%; width: 85%; background: rgba(0,0,0,0.85); border: 2px solid #ff007f; box-shadow: 0 0 15px #ff007f; color: #fff; padding: 15px; text-align: center; border-radius: 10px; z-index: 20; display: none; font-weight: bold; letter-spacing: 1px; }
        #win-msg p { color: #00ffff; font-size: 0.8rem; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>BUBBLE RING TOSS</h1>
    <div class="score">SCORE: <span id="s">00</span> / 10</div>

    <div class="console">
        <div class="tank">
            <div id="win-msg">💥 VICTORY 💥<p>PRESS HERE TO RESET </p></div>
            <div class="peg p-l"><div class="p-h"></div><div class="p-s"></div></div>
            <div class="peg p-r"><div class="p-h"></div><div class="p-s"></div></div>
            <canvas id="c"></canvas>
        </div>
        <div class="controls">
            <button class="btn" id="b-l"></button>
            <button class="btn" id="b-r"></button>
        </div>
    </div>

    <script>
        const cvs = document.getElementById('c'), ctx = cvs.getContext('2d'), scr = document.getElementById('s'), winMsg = document.getElementById('win-msg');
        const W = 296, H = 308; cvs.width = W; cvs.height = H;
        
        // Tuned water physics for a smoother, slower water flow feel
        const G = 0.05;       // Increased slightly so rings fall down with a bit more weight
        const RES = 0.95;     // Increased friction (from 0.975) to slow things down in the water
        const pgs = [{x: W*0.22+20, y: H*0.40+19, n: 0}, {x: W*0.78-20, y: H*0.40+19, n: 0}];
        let rings = [], bubbles = [];

        const neonColors = ['#FF0000', '#FF007F', '#39ff14', '#00FFFF', '#ff00ff'];

        class Ring {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * (W - 50) + 25; this.y = H - Math.random() * 30 - 20;
                this.vx = (Math.random() - 0.5) * 1.5; this.vy = -(Math.random() * 1.5 + 0.5);
                this.c = neonColors[Math.floor(Math.random() * neonColors.length)];
                this.a = Math.random() * 6; this.va = (Math.random() - 0.5) * 0.05; this.onPeg = false;
            }
            update() {
                if (this.onPeg) return;
                this.vy += G; this.vx *= RES; this.vy *= RES; this.x += this.vx; this.y += this.vy; this.a += this.va;
                
                if (this.x < 15) { this.x = 15; this.vx *= -0.4; }
                if (this.x > W - 15) { this.x = W - 15; this.vx *= -0.4; }
                if (this.y < 15) { this.y = 15; this.vy *= -0.2; }
                if (this.y > H - 15) { this.y = H - 15; this.vy *= -0.2; this.vx *= 0.7; }

                pgs.forEach(p => {
                    let d = Math.hypot(this.x - p.x, this.y - p.y);
                    if (d < 12 && this.vy > 0 && Math.abs(this.vx) < 1.0) {
                        this.onPeg = true; this.x = p.x; this.y = p.y + (p.n * 5.5);
                        this.vx = this.vy = this.va = this.a = 0; p.n++; 
                        let caught = rings.filter(r => r.onPeg).length;
                        scr.textContent = caught < 10 ? '0' + caught : caught;
                        if (caught === 10) winMsg.style.display = 'block';
                    }
                });
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.a);
                ctx.beginPath(); 
                ctx.arc(0, 0, 14, 0, 6.28); 
                ctx.arc(0, 0, 7, 0, 6.28, true); 
                
                ctx.shadowColor = this.c; ctx.shadowBlur = 6;
                ctx.fillStyle = this.c; ctx.fill();
                
                ctx.beginPath(); ctx.arc(0, 0, 11, 0, 6.28); ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1.5; ctx.stroke();
                ctx.restore();
            }
        }

        class Bubble {
            constructor(x) { this.x = x + (Math.random() - 0.5) * 16; this.y = H - 5; this.r = Math.random() * 3 + 1; this.vy = -(Math.random() * 2.5 + 2); this.l = 1.0; }
            update() { this.y += this.vy; this.vy *= 0.96; this.l -= 0.035; }
            draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, 6.28); ctx.fillStyle = `rgba(0, 255, 255, ${this.l * 0.4})`; ctx.fill(); }
        }

        const resetGame = () => { pgs.forEach(p => p.n = 0); rings.forEach(r => r.reset()); scr.textContent = '00'; winMsg.style.display = 'none'; };
        cvs.parentElement.addEventListener('click', () => { if (rings.filter(r => r.onPeg).length === 10) resetGame(); });

        for (let i = 0; i < 10; i++) rings.push(new Ring());

        function push(side) {
            const nX = side === 'l' ? W * 0.25 : W * 0.75;
            for (let i = 0; i < 8; i++) bubbles.push(new Bubble(nX));
            rings.forEach(r => {
                if (r.onPeg) return;
                let d = Math.hypot(r.x - nX, r.y - H);
                if (d < 170) {
                    // Softened impulse force scaling for a lighter flow
                    let f = (300 - d) / 14; 
                    let ang = Math.atan2(r.y - H, r.x - nX);
                    
                    // Reduced vertical and horizontal multipliers significantly
                    r.vx += Math.cos(ang) * f * 0.32 + (side === 'l' ? 0.25 : -0.25);
                    r.vy += Math.sin(ang) * f * 0.75 - 0.8; 
                    r.va += (Math.random() - 0.5) * 0.2;
                }
            });
        }

        const addEvt = (id, side) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); push(side); }, { passive: false });
            el.addEventListener('mousedown', () => push(side));
        };
        addEvt('b-l', 'l'); addEvt('b-r', 'r');

        function loop() {
            ctx.clearRect(0, 0, W, H);
            bubbles = bubbles.filter(b => b.y > 0 && b.l > 0);
            bubbles.forEach(b => { b.update(); b.draw(); });
            rings.forEach(r => { r.update(); r.draw(); });
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
